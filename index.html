<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ayzal Spending Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body { font-family: Arial; margin:0; padding:15px; background:#f5f5f5; }
h1 { text-align:center; }

.tabs { display:flex; gap:10px; margin:10px 0; }
.tabs button { flex:1; padding:12px; border:none; border-radius:10px; }
.active { background:black; color:white; }

.tab { display:none; }

.card { background:white; padding:12px; border-radius:10px; margin-bottom:10px; }

input, select, button {
 width:100%; padding:10px; margin-top:6px; border-radius:8px; border:1px solid #ccc;
}

button { background:black; color:white; }

canvas { display:block; margin:auto; }
</style>
</head>

<body>

<h1>Ayzal Bank Tracker</h1>

<div class="tabs">
  <button class="active" onclick="showTab('input', event)">Add Expense</button>
  <button onclick="showTab('dashboard', event)">Dashboard</button>
</div>

<!-- INPUT TAB -->
<div id="input" class="tab" style="display:block;">
<div class="card">

<input type="date" id="date">

<select id="category">
<option>Rent / Home Loan</option>
<option>Utilities</option>
<option>Internet & Mobile</option>
<option>Groceries</option>
<option>Dining Out</option>
<option>Uber</option>
<option>Electronics</option>
<option>Subscriptions</option>
<option>Medicines</option>
<option>Investments</option>
</select>

<input type="text" id="note" placeholder="Particular">
<input type="number" id="amount" placeholder="Amount">

<select id="medium">
<option>Savings Account</option>
<option>Credit Card</option>
</select>

<button onclick="addExpense()">Add Expense</button>

</div>
</div>

<!-- DASHBOARD TAB -->
<div id="dashboard" class="tab">

<div class="card">
<h3>Current Month</h3>
<h2 id="total">₹0</h2>
</div>

<div class="card">
<h3>Previous Month</h3>
<h2 id="prevTotal">₹0</h2>
</div>

<div class="card">
<h3>Change</h3>
<h2 id="change">₹0</h2>
</div>

<div class="card">
<h3>Daily Avg Spend</h3>
<h2 id="dailyAvg">₹0</h2>
</div>

<div class="card">
<h3>Projected Spend</h3>
<h2 id="projected">₹0</h2>
</div>

<div class="card">
<h3>Top Category</h3>
<h2 id="topCategory">-</h2>
</div>

<div class="card">
<h3>Transactions</h3>
<h2 id="txCount">0</h2>
</div>

<div class="card">
<canvas id="chart" width="250" height="250"></canvas>
</div>

<div class="card">
<button onclick="exportCSV()">Export CSV</button>
</div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("exp")) || [];

function save(){ localStorage.setItem("exp", JSON.stringify(data)); }

function addExpense(){
 let e = {
  date: date.value,
  category: category.value,
  note: note.value,
  amount: parseFloat(amount.value),
  medium: medium.value
 };

 if(!e.date || isNaN(e.amount)){
  alert("Enter required fields");
  return;
 }

 data.push(e);
 save();
 render();

 note.value="";
 amount.value="";
}

// FIXED TAB FUNCTION
function showTab(tab, evt){
 document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
 document.getElementById(tab).style.display='block';

 document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
 evt.target.classList.add('active');

 render();
}

function getMonth(offset){
 let d = new Date();
 d.setMonth(d.getMonth()+offset);
 return d.toISOString().slice(0,7);
}

function daysInMonth(){
 let d = new Date();
 return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}

function daysPassed(){
 return new Date().getDate();
}

function render(){

 let currentMonth = getMonth(0);
 let prevMonth = getMonth(-1);

 let current = data.filter(x=>x.date.startsWith(currentMonth));
 let prev = data.filter(x=>x.date.startsWith(prevMonth));

 let total = current.reduce((s,e)=>s+e.amount,0);
 let prevTotal = prev.reduce((s,e)=>s+e.amount,0);

 let change = total - prevTotal;
 let changePct = prevTotal ? ((change/prevTotal)*100).toFixed(1) : 0;

 let dailyAvg = total / daysPassed();
 let projected = dailyAvg * daysInMonth();

 let grouped = {};
 current.forEach(e=>{
  grouped[e.category]=(grouped[e.category]||0)+e.amount;
 });

 let topCategory = "-";
 let topValue = 0;

 for(let k in grouped){
  if(grouped[k] > topValue){
    topValue = grouped[k];
    topCategory = k;
  }
 }

 let topPct = total ? ((topValue/total)*100).toFixed(1) : 0;

 document.getElementById("total").innerText = "₹"+Math.round(total);
 document.getElementById("prevTotal").innerText = "₹"+Math.round(prevTotal);

 document.getElementById("change").innerText =
  (change>=0?"▲ ":"▼ ") + "₹"+Math.abs(Math.round(change)) +
  " ("+changePct+"%)";

 document.getElementById("dailyAvg").innerText = "₹"+Math.round(dailyAvg);
 document.getElementById("projected").innerText = "₹"+Math.round(projected);

 document.getElementById("topCategory").innerText =
  topCategory + " ("+topPct+"%)";

 document.getElementById("txCount").innerText = current.length;

 drawChart(grouped,total);
}

function drawChart(grouped,total){
 let ctx = chart.getContext("2d");
 ctx.clearRect(0,0,250,250);

 let start=0;
 let colors=["#111","#444","#777","#aaa","#ccc","#222","#666"];

 let i=0;
 for(let k in grouped){
  let val=grouped[k];
  let slice=(val/total)*2*Math.PI;

  ctx.beginPath();
  ctx.moveTo(125,125);
  ctx.arc(125,125,100,start,start+slice);
  ctx.fillStyle=colors[i++%colors.length];
  ctx.fill();

  start+=slice;
 }

 ctx.beginPath();
 ctx.arc(125,125,50,0,2*Math.PI);
 ctx.fillStyle="#f5f5f5";
 ctx.fill();
}

function exportCSV(){
 let csv = "Date,Category,Note,Amount,Medium\n";

 data.forEach(e=>{
  csv += `${e.date},${e.category},${e.note},${e.amount},${e.medium}\n`;
 });

 let blob = new Blob([csv], {type:'text/csv'});
 let url = URL.createObjectURL(blob);

 let a = document.createElement("a");
 a.href = url;
 a.download = "expenses.csv";
 a.click();
}

if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('sw.js');
}

date.value = new Date().toISOString().slice(0,10);

render();

</script>

</body>
</html>
